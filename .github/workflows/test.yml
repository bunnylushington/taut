name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test on Emacs ${{ matrix.emacs_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: [ "29.4", "30.1" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install package dependencies
        run: |
          emacs -batch --eval "(progn (require 'package) (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) (package-initialize) (package-refresh-contents) (package-install 'websocket) (package-install 'transient))"

      - name: Byte-compile source files
        run: |
          emacs -batch -eval "(package-initialize)" -L . -f batch-byte-compile *.el

      - name: Run test suite
        run: |
          emacs -batch -L . -l test/test-runner.el -f ert-run-tests-batch-and-exit
